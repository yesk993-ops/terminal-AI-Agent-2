name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests psutil
        pip install pylint mypy bandit pytest types-requests types-psutil

    - name: Lint with pylint
      run: |
        pylint core/ commands/ security/ api/ ui/ config/ logger/ main.py agent.py --exit-zero

    - name: Type check with mypy
      run: |
        mypy core/ commands/ security/ api/ ui/ config/ logger/ main.py agent.py

    - name: Security scan with bandit
      run: |
        bandit -r core/ commands/ security/ api/ --quiet

    - name: Test with pytest
      run: |
        pytest tests/ -v
